<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no"
    />

    <!-- iOS Home Screen behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Adventure Island" />

    <!-- App icons (multiple resolutions) -->
    <link rel="apple-touch-icon" href="../images/home4.png" />

    <link rel="manifest" href="manifest.json" />

    <title>Adventure Island 4</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --font-chalk:
          "Chalkboard SE", "Chalkboard", "Comic Neue", "Comic Sans MS", cursive;
        --colour-btn-face: #ffd600;
        --colour-btn-active: #ffc200;
        --colour-btn-border: #000000;
        --colour-heading-text: orange;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
      }

      body {
        font-family: var(--font-chalk);
        background: linear-gradient(to bottom, #30b0c7, #40c8e0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      h1 {
        font-family: var(--font-chalk);
        color: var(--colour-heading-text);
        width: 100%;
        text-align: center;
        letter-spacing: 0.03em;
        flex-shrink: 0;
        -webkit-text-stroke: 2px yellow;
      }

      .grid-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      .btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: yellow;
        background: var(--colour-btn-face);
        border: 2px solid var(--colour-btn-border);
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.4em;
        padding: 0 0.6em;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-text-stroke: 2px darkorange;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
        background: var(--colour-btn-active);
      }

      .btn-text {
        flex: 1;
        text-align: center;
        line-height: 1.05;
      }

      .btn-icon {
        height: 78%;
        width: auto;
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
      }

      /* LANDSCAPE */
      @media screen and (orientation: landscape) {
        body {
          background: linear-gradient(to bottom, #30b0c7, #40c8e0);
          overflow: hidden;
        }

        h1 {
          font-size: clamp(2rem, 7vw, 7rem);
          padding: 0.1em 0.5em;
          margin-top: 5vh;
          margin-bottom: -8vh;
        }

        .grid-wrapper {
          padding: 1vh 2vw 2vh;
          margin-top: 2vh;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: 1fr;
          gap: clamp(6px, 1.4vw, 16px);
          width: min(96vw, 1300px);
        }

        .btn {
          font-size: clamp(1rem, 4.5vw, 3.4rem);
          height: clamp(80px, 45vh, 220px);
        }
      }

      /* LANDSCAPE IPHONE */
      @media screen and (orientation: landscape) and (max-height: 450px) {
        body {
          background: linear-gradient(to bottom, #30b0c7, #40c8e0);
          width: 100vw !important;
          min-width: 100vw !important;
          overflow-x: hidden !important;
        }

        h1 {
          font-size: clamp(1rem, 7vw, 4rem) !important;
          padding: 0.1em 0.5em !important;
          margin-top: -3vh !important;
          margin-bottom: -8vh !important;
        }

        .grid-wrapper {
          padding: 1vh 4vw 2vh;
          margin-top: 1vh;
        }

        .btn {
          height: clamp(55px, 34vh, 130px) !important;
          font-size: clamp(1rem, 6vw, 3.4rem) !important;
        }
      }

      /* PORTRAIT */
      @media screen and (orientation: portrait) {
        body {
          overflow-y: auto;
          background: linear-gradient(to bottom, #30b0c7, #40c8e0);
        }

        h1 {
          font-size: clamp(1.5rem, 12vw, 4rem);
          padding: 0.3em 0.5em;
        }

        .grid-wrapper {
          padding: 2vw 9vw 10vw;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: clamp(10px, 10vw, 100px);
          width: 100%;
          max-width: 520px;
        }

        .btn {
          font-size: clamp(1.2rem, 11vw, 4.6rem);
          height: clamp(90px, 36vw, 340px);
        }
      }

      /* PORTRAIT IPHONE */
      @media screen and (orientation: portrait) and (max-width: 430px) {
        h1 {
          font-size: clamp(1.2rem, 12vw, 4rem) !important;
          padding: 0.3em 0.5em !important;
          -webkit-text-stroke: 1.5px yellow;
          line-height: 1;
        }

        .grid-wrapper {
          padding: 4vh 9vw 2vw !important;
        }

        .grid {
          gap: 30px !important;
          width: 100% !important;
          margin-top: -10vh !important;
        }

        .btn {
          height: clamp(90px, 30vw, 150px) !important;
          font-size: clamp(1.1rem, 11vw, 3.4rem) !important;
        }
      }
    </style>
  </head>

  <body>
    <h1>Adventure Island 4</h1>

    <div class="grid-wrapper">
      <div class="grid" id="main-grid">
        <a
          class="btn"
          href="typeup/index.html"
          style="background-color: #007286"
        >
          <span class="btn-text">Type Up!</span>
          <img class="btn-icon" src="images/kt4.png" alt="" />
        </a>
        <a
          class="btn"
          href="matchup/index.html"
          style="background-color: #007286"
        >
          <span class="btn-text">Match Up!</span>
          <img class="btn-icon" src="images/sm4.png" alt="" />
        </a>
        <a
          class="btn"
          href="wordup/index.html"
          style="background-color: #007286"
        >
          <span class="btn-text">Word Up!</span>
          <img class="btn-icon" src="images/kw4.png" alt="" />
        </a>
      </div>
    </div>
  </body>
</html>
