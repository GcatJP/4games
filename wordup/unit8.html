<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Adventure Island Word-Up!</title>
    <style>
      :root {
        --ocean-deep: #0e6e6e;
        --ocean: #0a9eb8;
        --ocean-light: #1ec8d4;
        --coral: #ff7b54;
        --sun: #ffd23f;
        --ink: #0b3d3a;
        --white: #fffdf8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        background: linear-gradient(to bottom, #30b0c7, #40c8e0);
        font-family: "Trebuchet MS", "Verdana", sans-serif;
        color: var(--ink);
      }

      /* decorative */
      .sun {
        position: absolute;
        top: max(10px, env(safe-area-inset-top, 10px));
        right: clamp(10px, 4vw, 40px);
        width: clamp(40px, 8vw, 72px);
        height: clamp(40px, 8vw, 72px);
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffefae, var(--sun) 70%);
        box-shadow: 0 0 24px 8px rgba(255, 210, 63, 0.5);
        pointer-events: none;
        z-index: 0;
      }
      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.82);
        border-radius: 50px;
        pointer-events: none;
        z-index: 0;
      }
      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: inherit;
        border-radius: 50%;
      }
      .cloud1 {
        top: 5%;
        left: 5%;
        width: 80px;
        height: 26px;
      }
      .cloud1::before {
        width: 40px;
        height: 40px;
        top: -18px;
        left: 8px;
      }
      .cloud1::after {
        width: 30px;
        height: 30px;
        top: -12px;
        left: 42px;
      }
      .cloud2 {
        top: 12%;
        left: 55%;
        width: 60px;
        height: 20px;
        opacity: 0.75;
      }
      .cloud2::before {
        width: 30px;
        height: 30px;
        top: -14px;
        left: 6px;
      }
      .cloud2::after {
        width: 22px;
        height: 22px;
        top: -8px;
        left: 32px;
      }

      /* layout */
      .wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: max(6px, env(safe-area-inset-top, 6px))
          max(10px, env(safe-area-inset-right, 10px))
          max(8px, env(safe-area-inset-bottom, 8px))
          max(10px, env(safe-area-inset-left, 10px));
        gap: 10px;
      }

      /* header row */
      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 4px 0 6px;
        gap: clamp(6px, 2vw, 14px);
      }

      h1 {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive, sans-serif;
        font-size: clamp(16px, 5.5vw, 50px);
        color: var(--sun);
        -webkit-text-stroke: 1.5px var(--ocean-deep);
        white-space: nowrap;
      }

      .reset-btn {
        background: var(--coral);
        color: var(--white);
        border: none;
        border-radius: 999px;
        padding: 4px 12px;
        font-size: clamp(10px, 2vw, 14px);
        white-space: nowrap;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 3px 0 #c2522f;
        font-family: inherit;
        flex-shrink: 0;
        text-decoration: none;
      }
      .reset-btn:active {
        transform: translateY(2px);
        box-shadow: none;
      }

      /* main play area */
      .stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 0;
        gap: clamp(10px, 2vh, 18px);
      }

      .progress {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        color: var(--white);
        -webkit-text-stroke: 0.5px var(--ocean-deep);
        font-size: clamp(13px, 3vw, 20px);
      }

      /* central voice button */
      .voice-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .voice-btn {
        width: clamp(90px, 22vw, 150px);
        height: clamp(90px, 22vw, 150px);
        border-radius: 50%;
        background: var(--ocean);
        border: 4px solid var(--ocean-deep);
        box-shadow: 0 8px 0 var(--ocean-deep);
        color: var(--white);
        font-size: clamp(2.2rem, 9vw, 4rem);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .voice-btn:active {
        transform: translateY(4px);
        box-shadow: 0 4px 0 var(--ocean-deep);
      }
      .voice-btn.speaking {
        background: var(--coral);
        box-shadow: 0 8px 0 #c2522f;
        animation: pulse 0.6s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.08);
        }
      }

      .voice-hint {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        color: var(--white);
        -webkit-text-stroke: 0.4px var(--ocean-deep);
        font-size: clamp(11px, 2.6vw, 15px);
      }

      /* choice grid: 3 image buttons */
      .choice-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        justify-items: center;
        gap: clamp(8px, 2vw, 18px);
        width: min(94vw, 640px);
      }

      .choice-btn {
        width: clamp(90px, 26vw, 190px);
        height: clamp(90px, 26vw, 190px);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: var(--white);
        border: 3px solid var(--ocean-light);
        border-radius: clamp(10px, 2vw, 18px);
        box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6%;
        cursor: pointer;
        transition: transform 0.1s ease;
      }
      .choice-btn img {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        object-fit: contain;
        pointer-events: none;
      }
      .choice-btn:active {
        transform: scale(0.96);
      }
      .choice-btn.correct {
        border-color: var(--sun);
        animation: glow 1s ease-in-out infinite alternate;
      }
      .choice-btn.wrong {
        animation: shake 0.4s;
        border-color: var(--coral);
      }
      .choice-btn.disabled {
        pointer-events: none;
        opacity: 0.55;
      }
      @keyframes glow {
        from {
          box-shadow:
            0 0 6px 0 rgba(255, 210, 63, 0.6),
            0 5px 0 rgba(0, 0, 0, 0.12);
        }
        to {
          box-shadow:
            0 0 18px 7px rgba(255, 210, 63, 0.85),
            0 5px 0 rgba(0, 0, 0, 0.12);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      .feedback {
        min-height: 22px;
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        font-size: clamp(13px, 3vw, 18px);
        color: var(--white);
      }
      .feedback.correct {
        -webkit-text-stroke: 0.5px #1d7a2c;
      }
      .feedback.wrong {
        -webkit-text-stroke: 0.5px #a23a1c;
      }

      /* PORTRAIT: choices stack 1x3 */
      @media (orientation: portrait) {
        .stage {
          justify-content: flex-start;
          overflow-y: auto;
          padding-top: clamp(4px, 1vh, 12px);
        }

        .choice-grid {
          grid-template-columns: 1fr;
          max-width: 320px;
          gap: clamp(6px, 1.2vh, 14px);
        }

        .choice-btn {
          width: clamp(80px, 26vh, 220px);
          height: clamp(80px, 26vh, 220px);
          margin: 0 auto;
        }

        .voice-btn {
          width: clamp(70px, 14vh, 130px);
          height: clamp(70px, 14vh, 130px);
          font-size: clamp(1.8rem, 6vh, 3.2rem);
        }
      }

      .rotate-msg {
        display: none;
        position: fixed;
        inset: 0;
        background: linear-gradient(to bottom, #30b0c7, #40c8e0);
        color: var(--white);
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 100;
        font-weight: bold;
        font-size: 18px;
        padding: 20px;
      }
      @media (orientation: landscape) and (max-height: 400px) {
        .rotate-msg {
          display: flex;
        }
      }

      /* win overlay */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(11, 61, 58, 0.72);
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }
      .overlay.show {
        display: flex;
      }
      .win-card {
        background: var(--white);
        border-radius: 24px;
        padding: clamp(20px, 5vw, 36px);
        text-align: center;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
        border: 4px solid var(--sun);
      }
      .win-card h2 {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        color: var(--coral);
        -webkit-text-stroke: 1px var(--ocean-deep);
        font-size: clamp(22px, 5.5vw, 30px);
        margin: 0 0 8px;
      }
      .win-card p {
        font-weight: bold;
        color: var(--ocean-deep);
        margin-bottom: 16px;
      }
      .win-emojis {
        font-size: 32px;
        margin-bottom: 8px;
      }

      /* intro overlay */
      .intro-card .example-label {
        font-size: clamp(11px, 2.5vw, 14px);
        font-weight: bold;
        color: var(--ocean);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .intro-card .intro-voice-btn {
        width: clamp(70px, 18vw, 100px);
        height: clamp(70px, 18vw, 100px);
        border-radius: 50%;
        background: var(--ocean);
        border: 4px solid var(--ocean-deep);
        box-shadow: 0 6px 0 var(--ocean-deep);
        color: var(--white);
        font-size: clamp(1.8rem, 7vw, 2.6rem);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin: 0 auto 14px;
      }
      .intro-card .intro-voice-btn:active {
        transform: translateY(3px);
        box-shadow: 0 3px 0 var(--ocean-deep);
      }
      .intro-card .intro-voice-btn.speaking {
        background: var(--coral);
        box-shadow: 0 6px 0 #c2522f;
        animation: pulse 0.6s ease-in-out infinite alternate;
      }
      .ok-btn {
        background: var(--ocean-deep);
        color: var(--white);
        border: none;
        border-radius: 999px;
        padding: 12px 32px;
        font-family: "Chalkboard SE", "Comic Sans MS", cursive, sans-serif;
        font-weight: bold;
        font-size: clamp(16px, 4vw, 20px);
        cursor: pointer;
        box-shadow: 0 4px 0 #073533;
      }
      .ok-btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="rotate-msg">
      <p>🔄 Please rotate your device to portrait mode!</p>
    </div>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="wrap">
      <div class="header">
        <a class="reset-btn" href="index.html">⬅️ Back</a>
        <h1>Unit 8</h1>
        <button class="reset-btn" id="resetBtn">Play Again 🦜</button>
      </div>

      <div class="stage">
        <div class="progress" id="progress">Question 1 of 16</div>

        <div class="voice-wrap">
          <button
            class="voice-btn"
            id="voiceBtn"
            aria-label="Hear the sentence"
            type="button"
          >
            🔊
          </button>
          <div class="voice-hint">Tap to listen!</div>
        </div>

        <div class="choice-grid" id="choiceGrid"></div>

        <div class="feedback" id="feedback"></div>
      </div>
    </div>

    <div class="overlay show" id="introOverlay">
      <div class="win-card intro-card">
        <div class="example-label">How to play</div>
        <button class="intro-voice-btn" id="introVoiceBtn" type="button">
          🔊
        </button>
        <p>
          Tap the speaker to hear the sentence, then tap the matching picture!
        </p>
        <button class="ok-btn" id="introOkBtn">OK</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="win-card">
        <div class="win-emojis">🏆 Great! 🏆</div>
        <h2>You finished all the questions!</h2>
        <p id="winStats">Adventure Island</p>
        <button class="reset-btn" id="playAgainBtn">Play Again 🌴</button>
      </div>
    </div>

    <script>
      /* ---- QUESTIONS — replace image paths with your real files ----
         NOTE: QUESTIONS[0] is used for the "how to play" example demo.
         Every round, this full list is duplicated (so each item shows
         twice) then shuffled. */
      const QUESTIONS = [
        { img: "../images/long-hair.png", answer: "long hair" },
        { img: "../images/glasses.png", answer: "glasses" },
        { img: "../images/curly.png", answer: "curly hair" },
        { img: "../images/ponytail.png", answer: "ponytail" },
        { img: "../images/mustache.png", answer: "mustache" },
        { img: "../images/short.png", answer: "short hair" },
        { img: "../images/blond.png", answer: "blond hair" },
        { img: "../images/straight.png", answer: "straight hair" },
        { img: "../images/blue-eyes.png", answer: "blue eyes" },
        { img: "../images/beard.png", answer: "beard" },
      ];
      /* ---- audio ---- */
      let audioCtx = null;
      function getCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }
      function playTone(freq, startTime, duration, gainPeak) {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        osc.start(startTime);
        osc.stop(startTime + duration + 0.02);
      }
      function playMatchJingle() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
          playTone(f, now + i * 0.09, 0.22, 0.22),
        );
      }
      function playWrongSound() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        playTone(220, now, 0.18, 0.12);
        playTone(196, now + 0.08, 0.18, 0.1);
      }
      function playWinFanfare() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        [523.25, 523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((f, i) =>
          playTone(f, now + [0, 0.15, 0.3, 0.45, 0.6, 0.8][i], 0.3, 0.22),
        );
      }

      /* ---- text-to-speech ---- */
      let pickedVoice = null;
      function choosePreferredVoice() {
        const voices = window.speechSynthesis
          ? window.speechSynthesis.getVoices()
          : [];
        if (!voices.length) return null;
        return (
          voices.find((v) => /en-US/i.test(v.lang) && /female/i.test(v.name)) ||
          voices.find((v) => /en-US/i.test(v.lang)) ||
          voices.find((v) => /^en/i.test(v.lang)) ||
          voices[0]
        );
      }
      if ("speechSynthesis" in window) {
        pickedVoice = choosePreferredVoice();
        window.speechSynthesis.onvoiceschanged = () => {
          pickedVoice = choosePreferredVoice();
        };
      }

      function speak(text, btnEl) {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "en-US";
        utter.rate = 0.9;
        utter.pitch = 1.05;
        if (pickedVoice) utter.voice = pickedVoice;

        if (btnEl) btnEl.classList.add("speaking");
        utter.onend = () => btnEl && btnEl.classList.remove("speaking");
        utter.onerror = () => btnEl && btnEl.classList.remove("speaking");

        window.speechSynthesis.speak(utter);
      }

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      /* ---- intro demo ---- */
      const introVoiceBtn = document.getElementById("introVoiceBtn");
      introVoiceBtn.addEventListener("click", () =>
        speak(QUESTIONS[0].answer, introVoiceBtn),
      );

      /* ---- game state ---- */
      let gameQuestions = [];
      let currentIndex = 0;
      let tries = 0;
      let locked = false;

      const voiceBtn = document.getElementById("voiceBtn");
      const choiceGrid = document.getElementById("choiceGrid");
      const feedback = document.getElementById("feedback");
      const progress = document.getElementById("progress");
      const overlay = document.getElementById("overlay");

      function buildChoices(correctItem) {
        const others = QUESTIONS.filter((q) => q.img !== correctItem.img);
        const distractors = shuffle(others).slice(0, 2);
        return shuffle([correctItem, ...distractors]);
      }

      function loadQuestion() {
        const q = gameQuestions[currentIndex];
        progress.textContent = `Question ${currentIndex + 1} of ${gameQuestions.length}`;
        feedback.textContent = "";
        feedback.className = "feedback";
        locked = false;

        const choices = buildChoices(q);
        choiceGrid.innerHTML = "";
        choices.forEach((choice) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.dataset.answer = choice.answer;
          const img = document.createElement("img");
          img.src = choice.img;
          img.alt = "";
          btn.appendChild(img);
          btn.addEventListener("click", () => checkChoice(btn, choice, q));
          choiceGrid.appendChild(btn);
        });

        // Auto-play the phrase as soon as the question loads.
        setTimeout(() => speak(q.answer, voiceBtn), 350);
      }

      function checkChoice(btnEl, choice, correctItem) {
        if (locked) return;
        getCtx();
        tries++;

        if (choice.img === correctItem.img) {
          locked = true;
          btnEl.classList.add("correct");
          document
            .querySelectorAll(".choice-btn")
            .forEach((b) => b.classList.add("disabled"));
          feedback.textContent = "🎉 That's right!";
          feedback.classList.add("correct");
          playMatchJingle();

          setTimeout(() => {
            currentIndex++;
            if (currentIndex >= gameQuestions.length) {
              showWin();
            } else {
              loadQuestion();
            }
          }, 1000);
        } else {
          btnEl.classList.add("wrong");
          feedback.textContent = "❌ Try again!";
          feedback.classList.add("wrong");
          playWrongSound();

          setTimeout(() => {
            btnEl.classList.remove("wrong");
          }, 400);
        }
      }

      function showWin() {
        document.getElementById("winStats").textContent =
          `You answered all ${gameQuestions.length} questions in ${tries} tries!`;
        overlay.classList.add("show");
        playWinFanfare();
      }

      function newGame() {
        // Every item appears twice per round, order fully shuffled.
        gameQuestions = shuffle([...QUESTIONS, ...QUESTIONS]);
        currentIndex = 0;
        tries = 0;
        overlay.classList.remove("show");
        loadQuestion();
      }

      voiceBtn.addEventListener("click", () => {
        const q = gameQuestions[currentIndex];
        if (q) speak(q.answer, voiceBtn);
      });

      document.getElementById("resetBtn").addEventListener("click", newGame);
      document
        .getElementById("playAgainBtn")
        .addEventListener("click", newGame);
      document.getElementById("introOkBtn").addEventListener("click", () => {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        document.getElementById("introOverlay").classList.remove("show");
        newGame();
      });

      gameQuestions = shuffle([...QUESTIONS, ...QUESTIONS]);
    </script>
  </body>
</html>
